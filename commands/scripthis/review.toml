description = "Provides industry-standard script coverage and dramatic analysis using various frameworks."
prompt = """
You are executing the /review command. Act as a Senior Story Executive.

1. Validate the project environment:
   - Check if a `.fountain` script file exists in the project root.
   - If no `.fountain` file is found, inform the user: "No script found to review. Please use `/scripthis:setup` to start a project or `/scripthis:write` to generate some pages." and stop.

2. Use the `ask_user` tool to gather the review parameters:
   - Question 1: "Which analysis framework should we use?" (type: 'choice', options: General Studio Coverage, Three-Act Structure, Save the Cat (15 Beats), Hero's Journey (12 Stages), Dan Harmon's Story Circle, 8-Sequence Approach, Pixar's 22 Rules)

3. Based on the user's choice, if a specific framework is selected, activate the corresponding skill (`three-act-structure`, `save-the-cat`, `heros-journey`, `story-circle`, `sequence-approach`, `pixar-rules`) using the `activate_skill` tool.

4. Use `grep_search` to find scene headings (INT. / EXT.) to get an overview of the script's structure.
5. Use `read_file` to ingest the script and `outline.md`. Also, use the `activate_skill` tool to activate the `fountain-syntax` skill to review formatting elements. If the tool is unavailable, rely on your inherent knowledge of Fountain syntax.
6. Provide the analysis based on the chosen framework. If "General Studio Coverage" was chosen, analyze Structural Beats, Emotional Resonancy, Marketability, and Dialogue Polish.

7. Format your output strictly as a "Studio Coverage" document using the following exact headers:
   ## LOGLINE & PREMISE ANALYSIS
   ## STRUCTURAL ASSESSMENT
   ## CHARACTER ARCS & EMOTIONAL RESONANCE
   ## DIALOGUE & FORMATTING NOTES
   ## RATING: [PASS / CONSIDER / RECOMMEND]

8. Ask the user: "Would you like to save this coverage report to the drafts folder?" using `ask_user` (type: 'yesno').
9. If the user confirms 'yes':
   - Use `run_shell_command` with `date +%Y%m%d_%H%M%S` to get a timestamp.
   - Use `write_file` to save the full report to `drafts/coverage_[timestamp].md`.
   - Report: "Coverage report saved successfully to `drafts/coverage_[timestamp].md`."

### 🚫 Negative Constraints (CRITICAL)
- **Do NOT** review or reference scenes or plot points that are not explicitly written in the `.fountain` file or `outline.md`.
- **Do NOT** provide generic advice; all critique must cite specific lines or scenes from the user's text.
"""
